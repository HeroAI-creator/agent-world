<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent World</title>
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 38%, #15271b 0%, #0a120c 68%, #060907 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #loading-screen .loading-inner {
        text-align: center;
        color: #eef3ea;
        font-family: Georgia, 'Times New Roman', serif;
      }
      #loading-screen .loading-title {
        font-size: 46px;
        letter-spacing: 2px;
        text-shadow: 0 0 20px rgba(255, 160, 48, 0.55);
        margin-bottom: 24px;
      }
      #loading-screen .loading-spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto;
        border: 3px solid rgba(255, 255, 255, 0.14);
        border-top-color: #ffa030;
        border-radius: 50%;
        animation: aw-spin 0.9s linear infinite;
      }
      #loading-screen .loading-sub {
        margin-top: 18px;
        font-size: 13px;
        letter-spacing: 1px;
        color: #9fb4a3;
        font-family: Consolas, monospace;
      }
      @keyframes aw-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading-screen">
        <div class="loading-inner">
          <div class="loading-title">🏘 Agent World</div>
          <div class="loading-spinner"></div>
          <div class="loading-sub">entering the village…</div>
        </div>
      </div>
      <div id="world-panel">
        <div id="topbar">
          <span id="title">🏘 Agent World</span>
          <span id="clock"><span id="tod">🌅</span> <span id="clock-label">Day 1 · 06:00</span></span>
          <span class="spacer"></span>
          <button id="pause-btn" title="Pause/resume the simulation (freezes API spend)">⏸ Pause</button>
          <select id="speed-select" title="Simulation speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
          </select>
          <span id="conn-dot" class="dot off" title="Server connection"></span>
        </div>
        <div id="game-container"></div>
        <section id="location-popover" class="forest-panel map-popover" hidden>
          <button class="panel-close" id="location-close" title="Close">x</button>
          <div class="panel-kicker" id="location-kicker">MAP STATION</div>
          <h2 id="location-title"></h2>
          <p id="location-desc"></p>
        </section>
        <section id="jarvis-panel" class="forest-panel jarvis-panel" hidden>
          <div class="panel-row">
            <div>
              <div class="panel-kicker">FIRE JARVIS</div>
              <h2>Campfire Interface</h2>
            </div>
            <button class="panel-close" id="jarvis-close" title="Close">x</button>
          </div>
          <div id="jarvis-chat-log" class="jarvis-chat-log"></div>
          <div class="jarvis-actions">
            <input id="jarvis-file-input" type="file" multiple hidden />
            <button id="jarvis-upload" type="button">Upload files</button>
          </div>
          <div class="jarvis-chat-bar">
            <input id="jarvis-input" type="text" maxlength="260" placeholder="Talk to Jarvis..." autocomplete="off" />
            <button id="jarvis-send" type="button">Send</button>
          </div>
        </section>
      </div>
      <div id="side-panel">
        <div id="agents-panel">
          <div class="panel-head">
            <span class="panel-title">VILLAGERS</span>
            <span class="spacer"></span>
            <button id="side-collapse-btn" class="panel-tool" type="button" title="Collapse sidebar">Collapse</button>
          </div>
          <div id="agent-cards"></div>
        </div>
        <div id="log-region">
          <div id="log-header">
            <span class="panel-title">AGENT LOG</span>
            <span class="spacer"></span>
            <select id="filter-select" title="Filter by agent">
              <option value="all">All agents</option>
            </select>
            <label class="autoscroll-label" title="Keep scrolled to the newest line">
              <input type="checkbox" id="autoscroll-chk" checked /> autoscroll
            </label>
            <button id="clear-btn" title="Clear the log">✕</button>
          </div>
          <div id="log-lines"></div>
        </div>
        <div id="chat-bar">
          <select id="chat-target" title="Who to speak to"></select>
          <input id="chat-input" type="text" maxlength="240" placeholder="Speak to the village…" autocomplete="off" />
          <button id="chat-send" title="Send (Enter)">Send</button>
        </div>
        <div id="log-stats">API: waiting for first stats…</div>
      </div>
      <button id="side-reopen-btn" type="button" title="Show villagers and log" hidden>Villagers</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
